name: Build and Deploy to Beacon-Web-Production

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    name: Build Vite/React app and deploy to beaconlabs.ai
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Vite frontend + Express server
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Deploy static files to Beacon-Web-Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BEACON_WEB_PRODUCTION_IP }}
          username: root
          key: ${{ secrets.BEACON_WEB_PRODUCTION_SSH_KEY }}
          script: |
            set -e
            echo "=== Beacon Labs — Web Production Deploy ==="
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            DEPLOY_DIR="/var/www/beaconlabs.ai"
            DIST_DIR="$DEPLOY_DIR/dist"

            # Pull latest code
            cd $DEPLOY_DIR
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
            echo "✓ Code updated"

            # Install ALL deps (devDeps needed for vite build)
            pnpm install --frozen-lockfile
            echo "✓ Dependencies installed"

            # Build the Vite frontend + Express server bundle
            NODE_ENV=production pnpm run build
            echo "✓ Build complete"

            # Restart the form handler service with updated code
            if systemctl is-active --quiet beaconlabs-form; then
              cp server/form-handler.mjs /opt/beaconlabs-form-handler/server.mjs
              systemctl restart beaconlabs-form
              echo "✓ Form handler restarted"
            fi

            echo "=== Deploy complete ==="

# ── Setup Instructions ────────────────────────────────────────────────────────
# Add these secrets to GitHub → Settings → Secrets and variables → Actions:
#
#   BEACON_WEB_PRODUCTION_IP  = 143.198.23.240
#   BEACON_WEB_PRODUCTION_SSH_KEY = (contents of manus_deploy private key)
#
# The public key must be added to /root/.ssh/authorized_keys on 143.198.23.240
#
# Note: pnpm must be installed on the production server:
#   npm install -g pnpm
# ─────────────────────────────────────────────────────────────────────────────
